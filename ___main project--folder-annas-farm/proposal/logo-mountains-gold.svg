    </linearGradient>
    <linearGradient id="gMt2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A08060"/>
      <stop offset="50%" stop-color="#7A6345"/>
      <stop offset="100%" stop-color="#5A4530"/>
